services:
  backend:
    build: .
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-encounters}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    networks:
      - frontend
      - backend
    depends_on:
      backend:
        condition: service_healthy

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
