server:
  port: 8080
spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
        - id: layout-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/layouts/**
        - id: campaign-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/campaigns/**
        - id: template-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/templates/**
