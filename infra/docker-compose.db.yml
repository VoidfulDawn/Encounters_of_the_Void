# Standalone development database.
# This file is intentionally isolated from docker-compose.yml; the db container
# is reachable at localhost:${DB_PORT} from host-side Spring services but is NOT
# on the internal `backend` network used by the full-stack compose file.
# To use both together, start them separately and point each Spring service at
# DB_HOST=host-gateway (or the host IP) from within the backend network.

services:
  db:
    image: postgres:16-alpine
    container_name: eotv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  db_data:
